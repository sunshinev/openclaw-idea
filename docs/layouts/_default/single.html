<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>{{ .Title }}</title>
</head>
<body>
  <header>
    <h1><a href="/">{{ .Site.Title }}</a></h1>
  </header>
  <main>
    <article>
      <h1>{{ .Title }}</h1>
      <time>{{ .Date.Format "2006-01-02" }}</time>
      {{ .Content }}
    </article>
  </main>
</body>
</html>
